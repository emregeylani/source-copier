# source_file_copier — project profiles
# Place this file next to source_file_copier.py
#
# Usage:  sc ~/Downloads/asset-manager.zip p:am
#         sc ~/Downloads/flow-tracker.zip  p:ft
#         sc --profiles   (list all profiles)
#
# Both p:name and p=name syntax are accepted.

[am]
target  = ~/git/asset-manager
ignored = __pycache__,*env*,.git*,dist,build,.pytest_cache

[ft]
target  = ~/git/flow-tracker
ignored = __pycache__,*env*,.git*,node_modules,dist,build,.pytest_cache

[sc]
target  = ~/git/source-copier
ignored = __pycache__,.git*

[dcc]
target  = ~/git/dcc-simulation
ignored = *.sh
